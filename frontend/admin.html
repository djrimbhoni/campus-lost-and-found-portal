<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Campus Lost & Found Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🔎 Lost & Found</div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="report-lost.html">Report Lost</a></li>
            <li><a href="report-found.html">Report Found</a></li>
            <li><a href="view-items.html">Browse Items</a></li>
            <li><a href="profile.html">Profile</a></li>
        </ul>
        <div class="nav-right">
            <span id="userGreeting" class="nav-user"></span>
            <button id="logoutBtn" class="btn-logout">Log Out</button>
        </div>
    </nav>

    <main class="page-content">
        <h1>Admin Panel</h1>
        <p class="subtitle" style="text-align:left; margin-bottom: 24px;">Manage users and items across the platform</p>

        <div class="profile-tabs">
            <button class="atab-btn active" data-atab="items">All Items</button>
            <button class="atab-btn" data-atab="users">All Users</button>
        </div>

        <div id="adminItemsSection" class="ptab-section">
            <p id="adminItemsLoading" class="loading-text">Loading items...</p>
            <div id="adminItemsTable"></div>
        </div>

        <div id="adminUsersSection" class="ptab-section" style="display: none;">
            <p id="adminUsersLoading" class="loading-text">Loading users...</p>
            <div id="adminUsersTable"></div>
        </div>
    </main>

    <script src="admin.js"></script>
</body>
</html>
