<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Campus Lost & Found Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🔎 Lost & Found</div>
        <ul class="nav-links">
            <li><a href="dashboard.html" class="active">Dashboard</a></li>
            <li><a href="report-lost.html">Report Lost</a></li>
            <li><a href="report-found.html">Report Found</a></li>
            <li><a href="view-items.html">Browse Items</a></li>
            <li><a href="profile.html">Profile</a></li>
        </ul>
        <div class="nav-right">
            <span id="userGreeting" class="nav-user"></span>
            <button id="logoutBtn" class="btn-logout">Log Out</button>
        </div>
    </nav>

    <main class="page-content">
        <div class="welcome-card">
            <h1 id="welcomeMessage">Welcome!</h1>
            <p>Here's a quick overview of your activity. More features are on the way.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-number">0</span>
                <span class="stat-label">Items Reported</span>
            </div>
            <div class="stat-card">
                <span class="stat-number">0</span>
                <span class="stat-label">Items Claimed</span>
            </div>
            <div class="stat-card">
                <span class="stat-number">0</span>
                <span class="stat-label">Items Returned</span>
            </div>
        </div>
    </main>
    <script src="config.js"></script>

    <script src="dashboard.js"></script>
</body>
</html>
